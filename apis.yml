aid: google-business-profile
name: Google Business Profile API
description: >-
  The Google Business Profile API provides an interface for managing business
  location information on Google. It enables developers to programmatically
  manage accounts, locations, reviews, media, posts, questions and answers,
  and verification for business listings.
